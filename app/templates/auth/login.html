{% extends 'base.html' %}

{% block title %}Login | Playtest Manager{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-primary bg-dark shadow-lg">
            <div class="card-header text-center border-primary bg-black p-4">
                <h3 class="text-ra-gold mb-0 fw-bold">
                    <i class="bi bi-controller"></i> Playtest Manager
                </h3>
            </div>
            
            <div class="card-body p-4">
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-4">
                        <label class="form-label text-white small fw-bold">RA Username</label>
                        <input type="text" 
                               name="username" 
                               class="form-control bg-black text-white border-secondary form-control-lg" 
                               placeholder="e.g. TimeCrush or cnat" 
                               required 
                               autofocus>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 fw-bold btn-lg">
                        Access Platform
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
