{% extends 'base.html' %}

{% block title %}Set Password - Playtest Coordinator{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card border-secondary shadow-lg bg-dark">
            <div class="card-header bg-black border-secondary py-3 text-center">
                <h4 class="mb-0 text-ra-gold">
                    <i class="bi bi-shield-lock-fill me-2"></i>Welcome, <span class="text-ra-blue">{{ user.username }}</span>
                </h4>
                <p class="text-muted small mb-0 mt-2">Set your access password to begin testing.</p>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('auth.setup_password', token=token) }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="password" class="form-label text-ra-gold small fw-bold">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-black border-secondary text-muted">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input type="password" name="password" id="password" 
                                   class="form-control bg-black text-white border-secondary" 
                                   placeholder="Enter your password" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label text-ra-gold small fw-bold">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-black border-secondary text-muted">
                                <i class="bi bi-check-circle-fill"></i>
                            </span>
                            <input type="password" name="confirm_password" id="confirm_password" 
                                   class="form-control bg-black text-white border-secondary" 
                                   placeholder="Confirm your password" required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-outline-success fw-bold py-2">
                            <i class="bi bi-person-check-fill me-2"></i>Activate Account and Login
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-black border-secondary text-center py-3">
                <small class="text-muted">This link expires in 24 hours.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
